<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Feedback - Mentor</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">MentorPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="students.html">
                <i class="ph ph-user"></i>‍<i class="ph ph-graduation-cap"></i> Manage Mentees
            </a>
            <a href="feedback.html" class="active">
                <i class="ph ph-chat-circle"></i> View Feedback
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="event.preventDefault(); logout();"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Feedback Ledger</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Review qualitative feedback received from your
                mentees.</p>
        </header>

        <section id="feedbackList" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <p style="color: var(--text-secondary); text-align: center; padding: 2rem;">Acquiring feedback data...</p>
        </section>
    </main>
    <script src="../js/api.js"></script>
    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        async function loadFeedback() {
            try {
                const res = await api('mentor/feedback');
                const el = document.getElementById('feedbackList');
                const fb = res.feedback || [];
                if (!fb.length) {
                    el.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No feedback narratives found.</p>';
                    return;
                }
                el.innerHTML = fb.map(f => `
                    <div class="card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; border-left: 4px solid var(--accent-start);">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 0.25rem;">${f.student_name}</div>
                                <div style="color: var(--text-secondary); font-size: 0.8rem;">${new Date(f.submitted_at).toLocaleDateString()} at ${new Date(f.submitted_at).toLocaleTimeString()}</div>
                            </div>
                            <span class="badge ${f.response_value >= 4 ? 'badge-success' : 'badge-warning'}" style="font-size: 1rem; padding: 0.5rem 1rem;">
                                Score: ${f.response_value}/5
                            </span>
                        </div>
                        
                        <div style="padding: 1rem; background: var(--bg-primary); border-radius: 10px; border: 1px solid var(--border);">
                            <div style="font-weight: 600; color: var(--accent-end); margin-bottom: 0.5rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">Inquiry</div>
                            <div style="line-height: 1.5;">${f.question_text}</div>
                        </div>

                        ${f.comment ? `
                            <div style="padding: 1rem; border-radius: 10px; border: 1px solid var(--border); font-style: italic; color: var(--text-secondary);">
                                " ${f.comment} "
                            </div>
                        ` : ''}

                        <div style="display: flex; justify-content: flex-end;">
                            <button class="btn btn-danger btn-sm" style="padding: 0.4rem 1rem;" onclick="deleteFeedback(${f.response_id})">Archive Feedback</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('feedbackList').innerHTML = '<p style="color: var(--danger); text-align: center;">System error while fetching feedback.</p>';
            }
        }

        async function deleteFeedback(id) {
            if (!confirm('Are you sure you want to archive this feedback response?')) return;
            try {
                await api(`feedback/${id}`, { method: 'DELETE' });
                loadFeedback();
            } catch (e) { alert('Archive failed: ' + e.message); }
        }

        async function logout() {
            try { await api('auth/logout', { method: 'POST' }); } catch (e) { }
            location.href = '../index.html';
        }

        loadFeedback();
    </script>
</body>

</html>
