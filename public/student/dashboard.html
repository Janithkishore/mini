<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Mentorship Feedback System</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">StudentHub</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="feedback.html">
                <i class="ph ph-chat-circle"></i> Submit Feedback
            </a>
            <a href="history.html">
                <i class="ph ph-file-text"></i> My History
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="event.preventDefault(); logout();"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Welcome back, <span id="userName"
                    style="color: var(--accent-start);">Student</span></h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Your mentorship portal and academic feedback
                system.</p>
        </header>

        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; align-items: start;">
            <div class="card" style="padding: 2.5rem; border-left: 4px solid var(--accent-start);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <div
                        style="width: 50px; height: 50px; background: var(--bg-secondary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                        <i class="ph ph-chalkboard-teacher"></i></div>
                    <h3 style="margin: 0;">Academic Mentor</h3>
                </div>
                <div id="mentorInfo">
                    <p style="color: var(--text-secondary);">Identifying assigned academic personnel...</p>
                </div>
            </div>

            <div class="card" style="padding: 2.5rem;">
                <h3 style="margin-bottom: 2rem;">Shortcut Portal</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <a href="feedback.html" class="btn btn-primary"
                        style="height: 52px; justify-content: center; display: flex; align-items: center;">Submit New
                        Feedback</a>
                    <a href="history.html" class="btn btn-secondary"
                        style="height: 52px; justify-content: center; display: flex; align-items: center;">Review
                        Submission History</a>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/api.js"></script>
    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        let user = null;
        async function loadUser() {
            try {
                const res = await api('auth/me');
                user = res.user;
                document.getElementById('userName').textContent = user.name;
            } catch (e) {
                location.href = '../index.html';
            }
        }

        async function loadMentor() {
            try {
                const res = await api('student/mentor');
                const el = document.getElementById('mentorInfo');
                if (res.mentor) {
                    el.innerHTML = `
                        <div style="font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--accent-start);">${res.mentor.name}</div>
                        <div style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                            <a href="mailto:${res.mentor.email}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;">
                                <span><i class="ph ph-envelope"></i></span> ${res.mentor.email}
                            </a>
                            <div style="color: var(--text-secondary); font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;">
                                <span><i class="ph ph-buildings"></i></span> ${res.mentor.department || 'General Faculty'}
                            </div>
                        </div>
                        <div style="padding: 1rem; background: var(--bg-primary); border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem; color: var(--text-secondary);">
                            Available for consultation during academic hours. Please coordinate via email for specific appointments.
                        </div>
                    `;
                } else {
                    el.innerHTML = `
                        <div style="padding: 2rem; background: var(--bg-primary); border-radius: 12px; border: 1px dashed var(--border); text-align: center;">
                            <div style="font-size: 2rem; margin-bottom: 1rem;"><i class="ph ph-hourglass-high"></i></div>
                            <div style="font-weight: 600; margin-bottom: 0.5rem;">No Mentor Assigned</div>
                            <div style="font-size: 0.85rem; color: var(--text-secondary);">Please contact the department HOD or system administrator to finalize your mentorship allocation.</div>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('mentorInfo').innerHTML = '<p style="color: var(--danger); text-align: center;">Connectivity error: Unable to retrieve mentor profile.</p>';
            }
        }

        async function logout() {
            try { await api('auth/logout', { method: 'POST' }); } catch (e) { }
            location.href = '../index.html';
        }

        loadUser().then(loadMentor);
    </script>
</body>

</html>
