<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Management - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">AdminPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="mentors.html">
                <i class="ph ph-chalkboard-teacher"></i> Mentors
            </a>
            <a href="students.html">
                <i class="ph ph-graduation-cap"></i> Students
            </a>
            <a href="feedback.html" class="active">
                <i class="ph ph-target"></i> Assignments
            </a>
            <a href="reports.html">
                <i class="ph ph-clipboard-text"></i> Reports
            </a>
            <a href="questions.html">
                <i class="ph ph-question"></i> Questions
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="logout()"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Mentor-Student Assignments</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Overview of student allocations to mentors.</p>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                <span style="color: var(--accent-start);"><i class="ph ph-handshake"></i></span> Active Assignments
            </h3>
            <div id="assignmentsList"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem;"></div>
        </div>
    </main>
    <script src="../js/api.js"></script>


    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        async function loadAssignments() {
            try {
                const response = await api('admin/assignments');
                displayAssignments(response.assignments || []);
            } catch (e) {
                console.error('Error loading assignments:', e);
                document.getElementById('assignmentsList').innerHTML = '<p style="color: var(--danger);">Error loading assignments.</p>';
            }
        }

        function displayAssignments(assignments) {
            const list = document.getElementById('assignmentsList');
            if (!assignments.length) {
                list.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1/-1; text-align: center; padding: 3rem;">No assignments found.</p>';
                return;
            }

            const groupedByMentor = {};
            assignments.forEach(assignment => {
                const mentorId = assignment.mentor_id;
                if (!groupedByMentor[mentorId]) {
                    groupedByMentor[mentorId] = {
                        mentor: assignment.mentor_name,
                        department: assignment.mentor_department,
                        students: []
                    };
                }
                groupedByMentor[mentorId].students.push(assignment);
            });

            list.innerHTML = Object.values(groupedByMentor).map(m => `
                <div class="card" style="background: var(--bg-secondary); border: 1px solid var(--border); transition: var(--transition); display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 0;">
                    <div style="display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                        <div style="width: 48px; height: 48px; background: var(--accent-start); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white;">
                            ${m.mentor.charAt(0)}
                        </div>
                        <div>
                            <h4 style="margin: 0; font-size: 1.25rem;">${m.mentor}</h4>
                            <span class="badge" style="background: hsla(265, 100%, 70%, 0.1); color: var(--accent-start); border: 1px solid var(--accent-start); margin-top: 0.25rem;">${m.department}</span>
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Assigned Students (${m.students.length})</div>
                        ${m.students.map(s => `
                            <div style="padding: 1rem; background: var(--bg-primary); border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <div style="font-weight: 600;">${s.student_name}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-secondary);">${s.register_number || 'N/A'}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 0.75rem; color: var(--text-secondary);">Assigned</div>
                                    <div style="font-size: 0.85rem; font-weight: 500;">${new Date(s.assigned_at).toLocaleDateString()}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadAssignments();
    </script>
</body>

</html>
