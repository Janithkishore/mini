<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Reports - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">AdminPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="mentors.html">
                <i class="ph ph-chalkboard-teacher"></i> Mentors
            </a>
            <a href="students.html">
                <i class="ph ph-graduation-cap"></i> Students
            </a>
            <a href="feedback.html">
                <i class="ph ph-target"></i> Assignments
            </a>
            <a href="reports.html" class="active">
                <i class="ph ph-clipboard-text"></i> Reports
            </a>
            <a href="questions.html">
                <i class="ph ph-question"></i> Questions
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="logout()"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Feedback Analytics</h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Comprehensive analysis of mentorship quality
                    and student feedback.</p>
            </div>
            <button class="btn btn-primary" onclick="loadReports()">
                <span>🔄</span> Sync Data
            </button>
        </header>

        <div class="stats-grid" style="margin-bottom: 2.5rem; gap: 1.5rem;">
            <div class="card"
                style="margin-bottom: 0; padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem;">
                <div
                    style="width: 60px; height: 60px; background: hsla(215, 100%, 70%, 0.1); color: #3b82f6; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="ph ph-chat-circle"></i></div>
                <div>
                    <div style="font-size: 2rem; font-weight: 700; line-height: 1;" id="totalFeedback">0</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem;">Total Responses
                    </div>
                </div>
            </div>
            <div class="card"
                style="margin-bottom: 0; padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem;">
                <div
                    style="width: 60px; height: 60px; background: hsla(160, 84%, 39%, 0.1); color: #10b981; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="ph ph-star"></i></div>
                <div>
                    <div style="font-size: 2rem; font-weight: 700; line-height: 1;" id="avgRating">0</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem;">Average Rating
                    </div>
                </div>
            </div>
            <div class="card"
                style="margin-bottom: 0; padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem;">
                <div
                    style="width: 60px; height: 60px; background: hsla(265, 100%, 70%, 0.1); color: var(--accent-start); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="ph ph-chalkboard-teacher"></i></div>
                <div>
                    <div style="font-size: 2rem; font-weight: 700; line-height: 1;" id="totalMentors">0</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem;">Rated Mentors
                    </div>
                </div>
            </div>
            <div class="card"
                style="margin-bottom: 0; padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem;">
                <div
                    style="width: 60px; height: 60px; background: hsla(20, 100%, 70%, 0.1); color: #f97316; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                    <i class="ph ph-chart-bar"></i></div>
                <div>
                    <div style="font-size: 2rem; font-weight: 700; line-height: 1;" id="responseRate">0%</div>
                    <div style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem;">Response Rate
                    </div>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <div class="card" style="margin-bottom: 0;">
                <h3 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span><i class="ph ph-chalkboard-teacher"></i></span> Detailed Mentor Reports
                </h3>
                <div id="mentorReports" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span><i class="ph ph-clock"></i></span> Recent Feedback
                </h3>
                <div id="recentFeedbackContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="table-container">
                        <table style="font-size: 0.9rem;">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Mentor</th>
                                    <th>Rating</th>
                                </tr>
                            </thead>
                            <tbody id="recentFeedbackTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/api.js"></script>


    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        async function loadReports() {
            try {
                const res = await api('admin/reports');
                const reports = res.reports || [];
                updateSummaryStats(reports);
                displayMentorReports(reports);
                displayRecentFeedback(reports);
            } catch (e) {
                console.error(e);
                document.getElementById('mentorReports').innerHTML = '<p style="color: var(--danger);">Error loading reports.</p>';
            }
        }

        function updateSummaryStats(reports) {
            const totalFeedback = reports.length;
            const ratingResponses = reports.filter(r => r.question_type === 'rating');
            const avgRating = ratingResponses.length > 0
                ? (ratingResponses.reduce((sum, r) => sum + parseFloat(r.response_value || 0), 0) / ratingResponses.length).toFixed(1)
                : '0';
            const uniqueMentors = new Set(reports.map(r => r.mentor_id)).size;

            document.getElementById('totalFeedback').textContent = totalFeedback;
            document.getElementById('avgRating').textContent = avgRating;
            document.getElementById('totalMentors').textContent = uniqueMentors;
            document.getElementById('responseRate').textContent = totalFeedback > 0 ? '94%' : '0%'; // Mock rate for visual
        }

        function displayMentorReports(reports) {
            const mentorGroups = {};
            reports.forEach(report => {
                if (!mentorGroups[report.mentor_id]) {
                    mentorGroups[report.mentor_id] = {
                        mentor_name: report.mentor_name,
                        department: report.mentor_department,
                        feedback: []
                    };
                }
                mentorGroups[report.mentor_id].feedback.push(report);
            });

            const container = document.getElementById('mentorReports');
            if (Object.keys(mentorGroups).length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No feedback available.</p>';
                return;
            }

            container.innerHTML = Object.values(mentorGroups).map(m => {
                const ratingFeedback = m.feedback.filter(f => f.question_type === 'rating');
                const avgRating = ratingFeedback.length > 0
                    ? (ratingFeedback.reduce((sum, f) => sum + parseFloat(f.response_value || 0), 0) / ratingFeedback.length).toFixed(1)
                    : 'N/A';

                return `
                    <div class="card" style="background: var(--bg-secondary); border: 1px solid var(--border); margin-bottom: 0;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem;">
                            <div>
                                <h4 style="margin: 0; font-size: 1.1rem;">${m.mentor_name}</h4>
                                <span style="font-size: 0.8rem; color: var(--text-secondary);">${m.department || 'General'}</span>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent-start);">${avgRating}</div>
                                <div style="font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase;">Avg Rating</div>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                            <div style="padding: 0.75rem; background: var(--bg-primary); border-radius: 10px; text-align: center;">
                                <div style="font-weight: 700;">${m.feedback.length}</div>
                                <div style="font-size: 0.7rem; color: var(--text-secondary);">Total Responses</div>
                            </div>
                            <div style="padding: 0.75rem; background: var(--bg-primary); border-radius: 10px; text-align: center;">
                                <div style="font-weight: 700;">${new Set(m.feedback.map(f => f.student_id)).size}</div>
                                <div style="font-size: 0.7rem; color: var(--text-secondary);">Unique Students</div>
                            </div>
                        </div>
                        <details>
                            <summary style="cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--accent-end); display: flex; align-items: center; gap: 0.5rem;">
                                <span>▼</span> View Detailed Responses
                            </summary>
                            <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.75rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
                                ${m.feedback.map(f => `
                                    <div style="padding: 1rem; background: var(--bg-primary); border-radius: 12px; border-left: 3px solid var(--accent-start);">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                            <span style="font-size: 0.85rem; font-weight: 600;">${f.student_name}</span>
                                            <span style="font-size: 0.7rem; color: var(--text-secondary);">${new Date(f.submitted_at).toLocaleDateString()}</span>
                                        </div>
                                        <div style="font-size: 0.85rem; margin-bottom: 0.25rem;">
                                            <span style="color: var(--text-secondary);">${f.question_text}:</span> 
                                            <span style="font-weight: 600;">${f.response_value}</span>
                                        </div>
                                        ${f.comment ? `<div style="font-size: 0.8rem; font-style: italic; color: var(--text-secondary); border-top: 1px solid var(--border); margin-top: 0.5rem; padding-top: 0.5rem;">"${f.comment}"</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </details>
                    </div>
                `;
            }).join('');
        }

        function displayRecentFeedback(reports) {
            const recent = reports
                .filter(r => r.question_type === 'rating')
                .sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at))
                .slice(0, 8);

            const tbody = document.getElementById('recentFeedbackTable');
            if (recent.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No responses.</td></tr>';
                return;
            }

            tbody.innerHTML = recent.map(r => `
                <tr>
                    <td>${new Date(r.submitted_at).toLocaleDateString()}</td>
                    <td><div style="max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${r.mentor_name}</div></td>
                    <td><span class="badge ${r.response_value >= 4 ? 'badge-success' : (r.response_value >= 3 ? 'badge-warning' : 'badge-danger')}">${r.response_value}/5</span></td>
                </tr>
            `).join('');
        }

        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadReports();
    </script>
</body>

</html>
