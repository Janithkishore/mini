<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Performance - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">AdminPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="mentors.html" class="active">
                <i class="ph ph-chalkboard-teacher"></i> Mentors
            </a>
            <a href="students.html">
                <i class="ph ph-graduation-cap"></i> Students
            </a>
            <a href="feedback.html">
                <i class="ph ph-target"></i> Assignments
            </a>
            <a href="reports.html">
                <i class="ph ph-clipboard-text"></i> Reports
            </a>
            <a href="questions.html">
                <i class="ph ph-question"></i> Questions
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="logout()"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Mentor Management</h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Monitor performance, ratings, and mentor
                    profiles.</p>
            </div>
            <button class="btn btn-primary" onclick="showAddMentorModal()">
                <span>+</span> Add New Mentor
            </button>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                <span style="color: var(--accent-start);"><i class="ph ph-trend-up"></i></span> Performance Comparison
            </h3>
            <div style="height: 300px;">
                <canvas id="comparisonChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 1.5rem;">Mentors Directory</h3>
            <div class="table-container">
                <table id="mentorTable">
                    <thead>
                        <tr>
                            <th>Mentor Name</th>
                            <th>Department</th>
                            <th>Avg Rating</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="mentorList">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profileModal" class="card"
            style="display: none; position: fixed; top: 50%; left: 55%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; background: var(--bg-secondary); border: 2px solid var(--accent-start); box-shadow: 0 0 100px rgba(0,0,0,0.8);">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
                <h3 style="margin: 0;">Mentor Profile</h3>
                <button class="btn btn-secondary" onclick="document.getElementById('profileModal').style.display='none'"
                    style="padding: 0.5rem 1rem;">✕ Close</button>
            </div>
            <div id="mentorProfileContent"
                style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;"></div>
            <div class="card" style="background: var(--bg-primary);">
                <h4 style="margin-bottom: 1.5rem;">Feedback Trends</h4>
                <div style="height: 250px;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Add/Edit Modal -->
        <div id="mentorModal" class="card"
            style="display: none; position: fixed; top: 50%; left: 55%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 600px; background: var(--bg-secondary); border: 1px solid var(--accent-start); box-shadow: 0 0 100px rgba(0,0,0,0.8);">
            <h3 id="mentorModalTitle" style="margin-bottom: 2rem;">Add Mentor</h3>
            <form id="mentorForm">
                <input type="hidden" id="mentorId" name="mentorId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Full Name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="email@college.edu">
                    </div>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <input type="text" id="department" name="department" required placeholder="e.g. IT">
                    </div>
                    <div class="form-group">
                        <label for="register_number">Register Number</label>
                        <input type="text" id="register_number" name="register_number" placeholder="Emp ID">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="experience_years">Experience Years</label>
                        <input type="number" id="experience_years" name="experience_years" min="0">
                    </div>
                    <div class="form-group">
                        <label for="specialization">Specialization</label>
                        <input type="text" id="specialization" name="specialization" placeholder="e.g. AI/ML">
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Save Mentor</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;"
                        onclick="document.getElementById('mentorModal').style.display='none'">Cancel</button>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="../js/api.js"></script>


    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        let comparisonChart = null;

        function getPerformanceColor(rating) {
            if (rating >= 4) return 'rgba(16, 185, 129, 0.7)'; // Green
            if (rating >= 2.5) return 'rgba(245, 158, 11, 0.7)'; // Orange
            return 'rgba(244, 63, 94, 0.7)'; // Red
        }

        async function loadComparison() {
            try {
                const res = await api('admin/mentors/comparison');
                const m = res.mentors || [];
                const colors = m.map(x => getPerformanceColor(x.avg_rating || 0));

                if (comparisonChart) comparisonChart.destroy();

                const ctx = document.getElementById('comparisonChart').getContext('2d');
                comparisonChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: m.map(x => x.name),
                        datasets: [{
                            label: 'Avg Rating',
                            data: m.map(x => x.avg_rating || 0),
                            backgroundColor: colors,
                            borderRadius: 8,
                            barPercentage: 0.5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 5,
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                            }
                        }
                    }
                });
                loadMentorList(m);
            } catch (e) { console.error(e); }
        }

        async function loadMentorList(performanceMentors) {
            try {
                const res = await api('admin/mentors');
                const mentors = res.mentors || [];
                const mentorMap = new Map(performanceMentors.map(p => [p.mentor_id, p]));

                const list = document.getElementById('mentorList');
                list.innerHTML = mentors.map(x => {
                    const perf = mentorMap.get(x.mentor_id);
                    const rating = perf ? perf.avg_rating : null;
                    const badgeClass = rating >= 4 ? 'badge-success' : (rating >= 2.5 ? 'badge-warning' : 'badge-danger');

                    return `
                        <tr>
                            <td>
                                <div style="font-weight: 600;">${x.name}</div>
                                <div style="font-size: 0.8rem; color: var(--text-secondary);">${x.email}</div>
                            </td>
                            <td>${x.department}</td>
                            <td>
                                <span class="badge ${badgeClass}">${rating || 'N/A'}</span>
                            </td>
                            <td>
                                <span class="badge" style="background: hsla(160, 84%, 39%, 0.1); color: var(--success); border: 1px solid var(--success);">Active</span>
                            </td>
                            <td>
                                <div style="display: flex; gap: 0.5rem;">
                                    <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="loadMentorProfile(${x.mentor_id})">View</button>
                                    <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: var(--warning); box-shadow: none;" onclick="editMentor(${x.mentor_id})">Edit</button>
                                    <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: var(--danger); box-shadow: none;" onclick="deleteMentor(${x.mentor_id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function loadMentorProfile(id) {
            try {
                const res = await api('admin/mentors/' + id + '/profile');
                const m = res.mentor;
                document.getElementById('mentorProfileContent').innerHTML = `
                    <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                        <h4 style="color: var(--accent-start); margin-bottom: 1rem;">Personal Info</h4>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <div><strong>Name:</strong> ${m.name}</div>
                            <div><strong>Email:</strong> ${m.email}</div>
                            <div><strong>Dept:</strong> ${m.department}</div>
                            <div><strong>Reg ID:</strong> ${m.register_number || 'N/A'}</div>
                        </div>
                    </div>
                    <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                        <h4 style="color: var(--accent-start); margin-bottom: 1rem;">Stats</h4>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <div><strong>Assigned Students:</strong> ${res.total_students_assigned}</div>
                            <div><strong>Avg Rating:</strong> ${res.average_rating || 'N/A'}</div>
                            <div><strong>Experience:</strong> ${m.experience_years || '0'} years</div>
                            <div><strong>Specialization:</strong> ${m.specialization || 'N/A'}</div>
                        </div>
                    </div>
                `;

                if (res.feedback_trends && res.feedback_trends.length) {
                    const tCtx = document.getElementById('trendChart').getContext('2d');
                    new Chart(tCtx, {
                        type: 'line',
                        data: {
                            labels: res.feedback_trends.map(t => t.date),
                            datasets: [{
                                label: 'Rating',
                                data: res.feedback_trends.map(t => t.avg_rating),
                                borderColor: 'hsla(265, 100%, 70%, 1)',
                                backgroundColor: 'hsla(265, 100%, 70%, 0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    min: 0,
                                    max: 5,
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                    ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                                }
                            }
                        }
                    });
                }
                document.getElementById('profileModal').style.display = 'block';
            } catch (e) { console.error(e); }
        }
        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadComparison();

        function showAddMentorModal() {
            document.getElementById('mentorModalTitle').textContent = 'Add Mentor';
            document.getElementById('mentorForm').reset();
            document.getElementById('mentorId').value = '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('password').required = true;
            document.getElementById('mentorModal').style.display = 'block';
        }

        async function editMentor(id) {
            try {
                const res = await api('admin/mentors/' + id + '/profile');
                document.getElementById('mentorModalTitle').textContent = 'Edit Mentor';
                document.getElementById('mentorId').value = id;
                document.getElementById('name').value = res.mentor.name;
                document.getElementById('email').value = res.mentor.email;
                document.getElementById('department').value = res.mentor.department;
                document.getElementById('register_number').value = res.mentor.register_number || '';
                document.getElementById('experience_years').value = res.mentor.experience_years || '';
                document.getElementById('specialization').value = res.mentor.specialization || '';
                document.getElementById('passwordGroup').style.display = 'none';
                document.getElementById('password').required = false;
                document.getElementById('mentorModal').style.display = 'block';
            } catch (e) { console.error(e); }
        }

        async function deleteMentor(id) {
            if (confirm('Are you sure you want to delete this mentor?')) {
                try {
                    await api('admin/mentors/' + id, { method: 'DELETE' });
                    loadComparison(); // Reload
                } catch (e) { console.error(e); }
            }
        }

        document.getElementById('mentorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const isEdit = data.mentorId;
            try {
                if (isEdit) {
                    await api('admin/mentors/' + data.mentorId, { method: 'PUT', body: JSON.stringify(data) });
                } else {
                    await api('admin/mentors', { method: 'POST', body: JSON.stringify(data) });
                }
                document.getElementById('mentorModal').style.display = 'none';
                loadComparison(); // Reload
            } catch (e) { console.error(e); }
        });
    </script>
</body>

</html>
