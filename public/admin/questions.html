<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">AdminPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="mentors.html">
                <i class="ph ph-chalkboard-teacher"></i> Mentors
            </a>
            <a href="students.html">
                <i class="ph ph-graduation-cap"></i> Students
            </a>
            <a href="feedback.html">
                <i class="ph ph-target"></i> Assignments
            </a>
            <a href="reports.html">
                <i class="ph ph-clipboard-text"></i> Reports
            </a>
            <a href="questions.html" class="active">
                <i class="ph ph-question"></i> Questions
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="logout()"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Feedback Configuration</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Customize the questionnaires used for
                student-mentor feedback.</p>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div class="card" style="margin-bottom: 0;">
                <h3 style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span style="color: var(--accent-start);"><i class="ph ph-plus"></i></span> Create New Question
                </h3>
                <form id="questionForm">
                    <div class="form-group">
                        <label>Question Content</label>
                        <textarea name="question_text"
                            placeholder="e.g., How would you rate the mentor's technical guidance?" required
                            style="width: 100%; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); padding: 1rem; font-family: inherit; font-size: 1rem; resize: none; min-height: 100px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Response Format</label>
                        <select name="question_type" required
                            style="width: 100%; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); padding: 0.75rem 1rem; font-size: 1rem;">
                            <option value="rating">Scale Rating (1-5)</option>
                            <option value="yes-no">Yes / No Toggle</option>
                            <option value="text">Open Text Response</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Publish
                        Question</button>
                </form>
                <div id="msg" class="alert" style="display: none; margin-top: 1.5rem; border-radius: 12px;"></div>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <h3 style="margin-bottom: 2.5rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span style="color: var(--accent-end);"><i class="ph ph-clipboard-text"></i></span> Active Questionnaire
                </h3>
                <div id="questionsList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </div>
    </main>
    <script src="../js/api.js"></script>


    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        async function loadQuestions() {
            try {
                const res = await api('admin/questions');
                const list = document.getElementById('questionsList');
                const questions = res.questions || [];

                if (questions.length === 0) {
                    list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No questions configured yet.</p>';
                    return;
                }

                list.innerHTML = questions.map((x, index) => `
                    <div style="padding: 1.25rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 12px; display: flex; gap: 1rem; align-items: flex-start; transition: var(--transition);">
                        <div style="width: 28px; height: 28px; background: var(--bg-secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: var(--accent-start); flex-shrink: 0; border: 1px solid var(--border);">
                            ${index + 1}
                        </div>
                        <div style="flex: 1;">
                            <div style="font-weight: 600; margin-bottom: 0.5rem; line-height: 1.4;">${x.question_text}</div>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <span class="badge" style="background: hsla(215, 100%, 70%, 0.1); color: #3b82f6; border: 1px solid #3b82f6;">${x.question_type.toUpperCase()}</span>
                                <span style="font-size: 0.75rem; color: var(--text-secondary);">Active Question</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            try {
                const fd = new FormData(e.target);
                await api('admin/questions', { method: 'POST', body: JSON.stringify(Object.fromEntries(fd)) });
                msg.className = 'alert alert-success';
                msg.textContent = 'Question published successfully!';
                msg.style.display = 'block';
                e.target.reset();
                loadQuestions();
                setTimeout(() => msg.style.display = 'none', 3000);
            } catch (err) {
                msg.className = 'alert alert-danger';
                msg.textContent = 'Error: ' + err.message;
                msg.style.display = 'block';
            }
        });

        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadQuestions();
    </script>
</body>

</html>
