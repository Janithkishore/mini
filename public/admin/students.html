<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance - Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="app-layout">
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-logo">AdminPortal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">
                <i class="ph ph-chart-bar"></i> Dashboard
            </a>
            <a href="mentors.html">
                <i class="ph ph-chalkboard-teacher"></i> Mentors
            </a>
            <a href="students.html" class="active">
                <i class="ph ph-graduation-cap"></i> Students
            </a>
            <a href="feedback.html">
                <i class="ph ph-target"></i> Assignments
            </a>
            <a href="reports.html">
                <i class="ph ph-clipboard-text"></i> Reports
            </a>
            <a href="questions.html">
                <i class="ph ph-question"></i> Questions
            </a>
            <div style="margin-top: auto; padding: 1rem 2rem;">
                <button class="theme-toggle" id="themeToggle"
                    style="width: 40px; height: 40px; background: var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;"><i class="ph ph-moon"></i></button>
                <a href="../index.html" onclick="logout()"
                    style="color: var(--danger); padding: 0.5rem 0; display: block; font-weight: 600;">Logout</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 3rem;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Student Performance</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Monitor attendance, grades, and academic trends.
            </p>
        </header>

        <div class="card">
            <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                <span><i class="ph ph-magnifying-glass"></i></span> Search Student
            </h3>
            <div style="display: flex; gap: 1rem;">
                <input type="text" id="searchInput" placeholder="Enter name or register number..."
                    style="flex: 1; padding: 1rem 1.5rem; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 1.05rem;">
                <button class="btn btn-primary" onclick="searchStudents()" style="min-width: 140px;">Search</button>
            </div>
            <div id="searchResults"
                style="margin-top: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem;">
            </div>
        </div>

        <div id="profileSection" class="card" style="display: none; animation: slide-up 0.5s ease-out;">
            <div
                style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                <div id="profileContent"></div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 1rem;">
                    <div id="attendanceAlert" class="badge badge-danger"
                        style="display: none; padding: 0.75rem 1.25rem; font-size: 0.9rem;"><i class="ph ph-warning"></i> Low Attendance Alert
                    </div>
                    <button class="btn btn-secondary" onclick="downloadReport()">
                        <span>💾</span> Export Report (PDF)
                    </button>
                </div>
            </div>

            <div
                style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 2.5rem;">
                <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                    <h4 style="margin-bottom: 1.5rem; color: var(--accent-start);">Subject-wise Grades</h4>
                    <div id="gradesContent" class="table-container"></div>
                </div>
                <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                    <h4 style="margin-bottom: 1.5rem; color: var(--accent-end);">Attendance Overview</h4>
                    <div id="attendanceContent" class="table-container"></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                    <h4 style="margin-bottom: 1.5rem;">Performance Visualization</h4>
                    <div style="height: 300px;">
                        <canvas id="chartCanvas"></canvas>
                    </div>
                </div>
                <div class="card" style="background: var(--bg-primary); margin-bottom: 0;">
                    <h4 style="margin-bottom: 1.5rem;">Recent Projects</h4>
                    <div id="projectsContent" style="display: flex; flex-direction: column; gap: 1rem;"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="../js/api.js"></script>


    <script>
        // Theme toggle logic
        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.innerHTML = storedTheme === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            themeBtn.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                themeBtn.innerHTML = next === 'light' ? '<i class=\"ph ph-sun\"></i>' : '<i class=\"ph ph-moon\"></i>';
            });
        }

        let selectedStudentId = null;
        let profileData = null;
        let pChart = null;

        async function searchStudents() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            try {
                const res = await api('admin/students/search?q=' + encodeURIComponent(q));
                const list = res.students || [];
                const resDiv = document.getElementById('searchResults');
                resDiv.innerHTML = list.length ? list.map(s => `
                    <div class="card" style="background: var(--bg-secondary); margin-bottom: 0; padding: 1rem; cursor: pointer; border: 1px solid var(--border); transition: var(--transition);" onclick="loadProfile(${s.user_id})">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 600;">${s.name}</div>
                                <div style="font-size: 0.85rem; color: var(--text-secondary);">${s.register_number || s.email}</div>
                            </div>
                            <span style="color: var(--accent-start);">→</span>
                        </div>
                    </div>
                `).join('') : '<p style="color: var(--text-secondary); grid-column: 1/-1; text-align: center; padding: 2rem;">No students found matching your search.</p>';
            } catch (e) { console.error(e); }
        }

        async function loadProfile(id) {
            selectedStudentId = id;
            try {
                const res = await api('admin/students/' + id);
                profileData = res;
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('profileSection').scrollIntoView({ behavior: 'smooth' });

                document.getElementById('profileContent').innerHTML = `
                    <h2 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-primary);">${res.student.name}</h2>
                    <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 1.5rem;">${res.student.email} • ${res.student.register_number || '-'}</p>
                    <div style="display: flex; gap: 2rem;">
                        <div>
                            <span style="display: block; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em;">Performance</span>
                            <span style="font-size: 1.5rem; font-weight: 700; color: var(--accent-start);">${res.overall_performance || 0}%</span>
                        </div>
                        <div>
                            <span style="display: block; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em;">CGPA</span>
                            <span style="font-size: 1.5rem; font-weight: 700; color: var(--accent-end);">${res.cgpa || 0}</span>
                        </div>
                        <div>
                            <span style="display: block; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em;">Attendance</span>
                            <span style="font-size: 1.5rem; font-weight: 700; color: #10b981;">${res.avg_attendance ?? '-'}%</span>
                        </div>
                    </div>
                `;

                document.getElementById('attendanceAlert').style.display = res.attendance_alert ? 'block' : 'none';

                document.getElementById('gradesContent').innerHTML = (res.grades || []).length ? `
                    <table>
                        <thead>
                            <tr><th>Subject</th><th>Marks</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            ${res.grades.map(g => `
                                <tr>
                                    <td style="font-weight: 500;">${g.subject_name || g.subject_code}</td>
                                    <td>${g.marks_obtained} / ${g.max_marks}</td>
                                    <td><span class="badge badge-success">Pass</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                ` : '<p style="padding: 2rem; text-align: center; color: var(--text-secondary);">No grade records found.</p>';

                document.getElementById('attendanceContent').innerHTML = (res.attendance || []).length ? `
                    <table>
                        <thead>
                            <tr><th>Subject Code</th><th>Percentage</th></tr>
                        </thead>
                        <tbody>
                            ${res.attendance.map(a => `
                                <tr>
                                    <td style="font-weight: 500;">${a.subject_code}</td>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 1rem;">
                                            <div style="flex: 1; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden;">
                                                <div style="width: ${a.pct}%; height: 100%; background: ${a.pct < 75 ? 'var(--danger)' : 'var(--success)'};"></div>
                                            </div>
                                            <span style="font-weight: 600; min-width: 45px;">${a.pct}%</span>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                ` : '<p style="padding: 2rem; text-align: center; color: var(--text-secondary);">No attendance records found.</p>';

                document.getElementById('projectsContent').innerHTML = (res.projects || []).length ? res.projects.map(p => `
                    <div style="padding: 1rem; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border);">
                        <div style="font-weight: 600; margin-bottom: 0.25rem;">${p.project_title}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.85rem; color: var(--text-secondary);">Score: ${p.marks_obtained || '-'}/${p.max_marks || 100}</span>
                            <span class="badge badge-success">Completed</span>
                        </div>
                    </div>
                `).join('') : '<p style="text-align: center; color: var(--text-secondary); padding: 1rem;">No project data.</p>';

                if (window.Chart && res.grades && res.grades.length) {
                    if (pChart) pChart.destroy();
                    const ctx = document.getElementById('chartCanvas').getContext('2d');
                    pChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: res.grades.map(g => g.subject_name || g.subject_code),
                            datasets: [{
                                label: 'Marks %',
                                data: res.grades.map(g => (g.marks_obtained / (g.max_marks || 100)) * 100),
                                backgroundColor: 'rgba(99, 102, 241, 0.6)',
                                borderColor: 'rgba(99, 102, 241, 1)',
                                borderWidth: 2,
                                borderRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)' } },
                                x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)' } }
                            }
                        }
                    });
                }
            } catch (e) { console.error(e); }
        }

        function downloadReport() {
            if (!profileData || !window.jspdf) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.text('Academic Performance Report', 20, 20);
            doc.setFontSize(14);
            doc.text('Student: ' + profileData.student.name, 20, 35);
            doc.text('Register No: ' + (profileData.student.register_number || 'N/A'), 20, 45);
            doc.text('Overall Performance: ' + (profileData.overall_performance || 0) + '%', 20, 60);
            doc.text('CGPA: ' + (profileData.cgpa || 0), 20, 70);
            doc.text('Average Attendance: ' + (profileData.avg_attendance ?? '-') + '%', 20, 80);
            if (profileData.attendance_alert) {
                doc.setTextColor(220, 53, 69);
                doc.text('STATUS: LOW ATTENDANCE ALERT', 20, 95);
            }
            doc.save(`Report_${profileData.student.register_number || 'Student'}.pdf`);
        }
        async function logout() { await api('auth/logout', { method: 'POST' }); }
    </script>
</body>

</html>
