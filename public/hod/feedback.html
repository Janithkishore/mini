<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Management - HOD</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-logo">HOD Portal</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="mentors.html">Mentor Performance</a>
            <a href="assignments.html">Assign Mentor & Students</a>
            <a href="../index.html" onclick="logout()">Logout</a>
        </nav>
    </aside>
    <main class="main-content">
        <h1>Feedback Management</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">View all feedback. Filter by mentor or department. Delete feedback.</p>

        <div class="card">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <input type="text" id="filterMentor" placeholder="Mentor ID" style="max-width: 120px;">
                <input type="text" id="filterDept" placeholder="Department">
                <button class="btn btn-primary" onclick="loadFeedback()">Filter</button>
            </div>
            <div class="table-wrap">
                <table class="styled-table">
                    <thead>
                        <tr><th>Date</th><th>Student</th><th>Mentor/Dept</th><th>Question</th><th>Response</th><th>Action</th></tr>
                    </thead>
                    <tbody id="feedbackTable"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="../js/api.js"></script>
    

    <script>
        async function loadFeedback() {
            try {
                const m = document.getElementById('filterMentor').value;
                const d = document.getElementById('filterDept').value;
                let url = 'feedback?';
                if (m) url += 'mentor_id=' + m + '&';
                if (d) url += 'department=' + encodeURIComponent(d) + '&';
                const res = await api(url);
                const rows = res.feedback || [];
                const tbody = document.getElementById('feedbackTable');
                tbody.innerHTML = rows.map(f =>
                    `<tr>
                        <td>${new Date(f.submitted_at).toLocaleString()}</td>
                        <td>${f.student_name}</td>
                        <td>${f.mentor_name || '—'} (${f.mentor_dept || '—'})</td>
                        <td>${f.question_text}</td>
                        <td>${f.response_value}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteFeedback(${f.response_id})">Delete</button></td>
                    </tr>`
                ).join('') || '<tr><td colspan="6">No feedback.</td></tr>';
            } catch (e) { console.error(e); }
        }
        async function deleteFeedback(id) {
            if (!confirm('Delete this feedback?')) return;
            try {
                await api(`feedback/${id}`, { method: 'DELETE' });
                loadFeedback();
            } catch (e) { alert(e.message); }
        }
        async function logout() { await api('auth/logout', { method: 'POST' }); }
        loadFeedback();
    </script>
</body>
</html>
